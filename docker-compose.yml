# docker-compose.yml — works on both bare `docker compose` and Portainer.
#
# Required env vars (set them in your shell, or in Portainer's stack
# "Environment variables" section):
#   NANOGPT_API_KEY      — upstream NanoGPT API key
#   ADMIN_TOKEN          — token to log in to the admin dashboard
#   ADMIN_COOKIE_SECRET  — 32+ random bytes (hex). Used to sign session cookies.
#
# The Go binary itself validates that NANOGPT_API_KEY and ADMIN_TOKEN are
# non-empty on startup and exits with a clear error if they aren't, so the
# container will fail loudly (and visibly in `docker compose ps`) instead of
# booting with empty secrets.
#
# Override the image name with: `IMAGE=ghcr.io/you/nano-proxy:0.1.0 docker compose up -d`

name: nano-proxy

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-defaults: &defaults
  restart: unless-stopped
  init: true
  stop_grace_period: 30s

services:
  nano-proxy:
    # `build:` is used by `docker compose build` and Portainer's
    # Repository build method. To pull a prebuilt image instead,
    # comment `build:` and uncomment `image:` below.
    build:
      context: .
      dockerfile: Dockerfile
    # image: ${IMAGE:-nano-proxy:local}
    image: ${IMAGE:-nano-proxy:local}
    container_name: nano-proxy
    <<: *defaults
    ports:
      - "8080:8080"               # public proxy (clients)
      - "127.0.0.1:8081:8081"     # admin dashboard — loopback-only on the host
    environment:
      # Plain `${VAR}` references — supported by both docker compose v2 and
      # Portainer. If a var is missing in the stack env section, it expands
      # to an empty string; the Go binary will then refuse to start with a
      # clear error message in the container logs.
      NANOGPT_API_KEY:     ${NANOGPT_API_KEY}
      ADMIN_TOKEN:         ${ADMIN_TOKEN}
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET}
      # Go runtime tuning for the 512 MB VPS target.
      GOMEMLIMIT: "400MiB"
      GOGC:       "50"
    volumes:
      - ./config.yaml:/etc/nano-proxy/config.yaml:ro
      - nano-data:/home/nano/data
    # Hard memory cap matches the target VPS. RSS will typically settle ~30–60 MB.
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *logging

volumes:
  nano-data:
    name: nano-proxy-data
